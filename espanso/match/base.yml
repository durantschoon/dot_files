  - trigger: "wkxx"
    replace: Give me my weekly update for the week beginning Sunday, {{most_recent_sunday}}.
    vars:
    # uses GNU date syntax
    - name: most_recent_sunday
      type: shell
      params:
        cmd: |
          # Get the day of week (0=Sunday, 1=Monday, etc.)
          day_of_week=$(date +%w)
          # Calculate days to subtract to get to most recent Sunday
          days_to_subtract=$day_of_week
          # Get the date of most recent Sunday using GNU date syntax
          date --date="${days_to_subtract} days ago" +"%B %d, %Y"
  - trigger: "tdxx"
    replace: Give me the daily update for {{mydate}}.
    vars:
    - name: mydate
      type: date
      params:
        format: "%B %d, %Y"
