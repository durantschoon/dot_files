    replace: "Thursday"
  - trigger: "fxx"
    replace: "Friday"
  - trigger: "sxx"
    replace: "Saturday"
  - trigger: "uxx"
    replace: "Sunday"

  # Months - but only if the the trigger is shorter than the month name
  - trigger: "Jxx"
    replace: "January"
